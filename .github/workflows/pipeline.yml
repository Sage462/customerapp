name: CustomerApp CI-CD Pipeline

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5

        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build Docker Image
        run: |
          docker build -t customerapp .

  test:

    needs: build

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5

        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Tests
        run: |
          pytest tests/

  security:

    needs: test

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main

        with:
          project: customerapp
          path: .
          format: HTML
          failBuildOnCVSS: 7

      - name: Upload Security Report
        uses: actions/upload-artifact@v4

        with:
          name: owasp-report
          path: reports

  deploy-green:

    needs: security

    runs-on: ubuntu-latest

    steps:

      - name: Deploy to GREEN Environment
        run: |
          echo "Deploying application to GREEN environment"

      - name: Health Check
        run: |
          curl --fail http://green.customerapp/health || exit 1

      - name: Switch Traffic
        run: |
          echo "Switch traffic BLUE -> GREEN"

      - name: Keep BLUE as rollback
        run: |
          echo "BLUE environment retained"
